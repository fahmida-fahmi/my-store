<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockView Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1520;
      --surface2: #141e2d;
      --surface3: #1a2539;
      --border: #1f2e45;
      --border2: #243354;
      --accent: #00d4ff;
      --accent2: #0099cc;
      --accent3: #00ffaa;
      --accent4: #ff6b35;
      --text: #e8f0fe;
      --text2: #8ba3c7;
      --text3: #4a6285;
      --green: #00e676;
      --yellow: #ffd740;
      --red: #ff5252;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0, 212, 255, .06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: drift1 20s ease-in-out infinite alternate
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0, 255, 170, .04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: drift2 25s ease-in-out infinite alternate
    }

    @keyframes drift1 {
      to {
        transform: translate(100px, 100px)
      }
    }

    @keyframes drift2 {
      to {
        transform: translate(-100px, -80px)
      }
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      position: relative;
      background: rgba(8, 12, 20, .92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px
    }

    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 68px
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      text-decoration: none
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -.5px;
      color: #000;
      box-shadow: 0 0 20px rgba(0, 212, 255, .3);
      font-family: 'Poppins', sans-serif
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -.5px
    }

    .search-wrap {
      flex: 1;
      max-width: 560px;
      position: relative
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 15px;
      pointer-events: none
    }

    #searchInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 40px 10px 42px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s
    }

    #searchInput::placeholder {
      color: var(--text3)
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, .1);
      background: var(--surface3)
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 15px;
      display: none;
      padding: 4px;
      border-radius: 4px;
      transition: color .2s;
      align-items: center
    }

    .search-clear:hover {
      color: var(--text)
    }

    .search-clear.vis {
      display: flex
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-shrink: 0
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      white-space: nowrap
    }

    .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent3);
      animation: pulse 2s ease-in-out infinite
    }

    .stat-dot.offline {
      background: var(--red)
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .6;
        transform: scale(.8)
      }
    }

    .refresh-btn {
      width: 34px;
      height: 34px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .refresh-btn.spinning svg,
    .refresh-btn.spinning .spin-icon {
      animation: spin .8s linear infinite
    }

    .refresh-btn.spinning {
      animation: none
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ── Filters ── */
    .filter-section {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 32px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap
    }

    .filter-label {
      font-size: 11px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      transition: all .2s
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .chip.active {
      background: rgba(0, 212, 255, .1);
      border-color: var(--accent);
      color: var(--accent)
    }

    .results-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--text3)
    }

    .results-count span {
      color: var(--accent);
      font-weight: 600
    }

    /* ── Grid ── */
    .grid-section {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 32px 60px;
      position: relative;
      z-index: 1
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px
    }

    /* ── Card ── */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      animation: cardIn .4s ease both;
      position: relative
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(.97)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: var(--border2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .4), 0 0 0 1px rgba(0, 212, 255, .1)
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity .3s
    }

    .product-card:hover::before {
      opacity: 1
    }

    .card-header {
      padding: 16px 16px 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px
    }

    .card-image {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      overflow: hidden
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .card-info {
      flex: 1;
      min-width: 0
    }

    .card-sku {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 3px
    }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .color-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text2);
      font-weight: 500
    }

    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .2)
    }

    .model-badge {
      font-size: 10px;
      padding: 2px 8px;
      background: rgba(255, 255, 255, .05);
      border-radius: 20px;
      color: var(--text3);
      border: 1px solid var(--border)
    }

    .card-body {
      padding: 0 16px 16px
    }

    .stock-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border)
    }

    .stock-label {
      font-size: 10px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .stock-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 5px;
      width: 80px
    }

    .stock-bar {
      height: 100%;
      border-radius: 2px;
      transition: width .8s ease
    }

    .stock-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1
    }

    .sh {
      color: var(--green)
    }

    .sm {
      color: var(--yellow)
    }

    .sl {
      color: var(--red)
    }

    .sz {
      color: var(--text3)
    }

    .deliveries-preview {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .delivery-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      min-width: 54px
    }

    .delivery-month {
      font-size: 9px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase
    }

    .delivery-qty {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent3);
      margin-top: 2px
    }

    .no-delivery {
      font-size: 11px;
      color: var(--text3);
      font-style: italic
    }

    /* ── Skeleton ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      animation: shimmer 1.5s infinite
    }

    @keyframes shimmer {
      0% {
        opacity: 1
      }

      50% {
        opacity: .5
      }

      100% {
        opacity: 1
      }
    }

    .skel-line {
      background: var(--surface3);
      border-radius: 6px;
      margin-bottom: 10px
    }

    /* ── Empty ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 32px;
      color: var(--text3)
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(0, 212, 255, .1);
      transform: scale(.93) translateY(20px);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), opacity .3s;
      opacity: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
      opacity: 1
    }

    .modal-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
      border-radius: 20px 20px 0 0
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    .modal-close:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .modal-sku {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .modal-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      padding-right: 40px;
      margin-bottom: 10px
    }

    .modal-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
      display: inline-flex;
      align-items: center;
      gap: 5px
    }

    .tag-model {
      background: rgba(0, 212, 255, .08);
      border-color: rgba(0, 212, 255, .3);
      color: var(--accent)
    }

    .tag-color {
      background: rgba(255, 255, 255, .05);
      border-color: var(--border2);
      color: var(--text2)
    }

    .tag-mfr {
      background: rgba(0, 255, 170, .06);
      border-color: rgba(0, 255, 170, .25);
      color: var(--accent3)
    }

    .modal-body {
      padding: 20px 24px 24px
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px
    }

    .info-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px
    }

    .info-card-label {
      font-size: 10px;
      color: var(--text3);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px
    }

    .info-card-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1
    }

    .info-card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .deliveries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      margin-bottom: 20px
    }

    .delivery-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
      transition: border-color .2s, transform .2s;
      animation: fadeUp .4s ease both
    }

    .delivery-card:hover {
      border-color: var(--accent3);
      transform: translateY(-2px)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .delivery-card-month {
      font-size: 10px;
      color: var(--text3);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px
    }

    .delivery-card-qty {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent3)
    }

    .details-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 20px
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border)
    }

    .detail-row:last-child {
      border-bottom: none
    }

    .detail-key {
      font-size: 11px;
      color: var(--text3);
      font-weight: 600;
      min-width: 110px;
      flex-shrink: 0;
      padding-top: 1px
    }

    .detail-val {
      font-size: 12px;
      color: var(--text2);
      word-break: break-all;
      flex: 1
    }

    .detail-val a {
      color: var(--accent);
      text-decoration: none
    }

    .detail-val a:hover {
      text-decoration: underline
    }

    .notes-box {
      background: rgba(255, 215, 64, .06);
      border: 1px solid rgba(255, 215, 64, .2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6
    }

    /* ── Last updated bar ── */
    .last-updated {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 32px 6px;
      font-size: 11px;
      color: var(--text3);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      z-index: 2000;
      transform: translateY(100px);
      opacity: 0;
      transition: all .35s cubic-bezier(.34, 1.56, .64, 1);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    @media(max-width:768px) {
      header {
        padding: 0 16px
      }

      .header-right .stat-pill {
        display: none
      }

      .api-banner,
      .filter-section,
      .grid-section,
      .last-updated {
        padding-left: 16px;
        padding-right: 16px
      }

      .products-grid {
        grid-template-columns: 1fr
      }

      .info-grid {
        grid-template-columns: 1fr
      }

      .modal {
        border-radius: 16px
      }

      .logo-text {
        display: none
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">SH</div>
        <span class="logo-text">Sit Healthier</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search SKU, product name, color, model…" autocomplete="off">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
      <div class="header-right">
        <div class="stat-pill">
          <div class="stat-dot" id="statDot"></div><span id="totalCount">—</span> Products
        </div>
        <button class="btn btn-outline btn-sm" id="apiConnectBtn" onclick="toggleApiPanel()"
          title="Connect Google Sheets API" style="padding:6px 12px;font-size:11px;border-radius:8px">⚡ API</button>
        <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)" title="Refresh data"><span
            class="spin-icon" style="display:inline-block;font-size:16px;line-height:1">↻</span></button>
      </div>
      <!-- Slide-down API panel -->
      <div id="apiPanel"

    // ─── Color map ────────────────────────────────────────────────────────────────
    const COLOR_MAP = {
      black: '#2d2d2d', white: '#f0f0f0', red: '#e53935', purple: '#9c27b0',
      'light purple': '#ce93d8', 'dark purple': '#6a1b9a', puple: '#9c27b0',
      vanilla: '#f5e6c8', grey: '#9e9e9e', gray: '#9e9e9e', green: '#43a047',
      'rust orange': '#bf360c', 'rust onrage': '#bf360c', orange: '#ef6c00',
      'bright orange': '#ff6d00', 'light brown': '#a1887f', 'dark brown': '#4e342e',
      blue: '#1e88e5', pink: '#e91e63', yellow: '#fdd835'
    };
    function colorDot(c) { const k = (c || '').toLowerCase().trim(); return `<span class="color-dot" style="background:${COLOR_MAP[k] || '#555'}"></span>` }
    function stockCls(n) { return n <= 0 ? 'sz' : n <= 10 ? 'sl' : n <= 50 ? 'sm' : 'sh' }
    function stockColor(n) { return n <= 0 ? 'var(--text3)' : n <= 10 ? 'var(--red)' : n <= 50 ? 'var(--yellow)' : 'var(--green)' }

    // ─── API URL ──────────────────────────────────────────────────────────────────
    if (apiUrl) document.getElementById('apiUrlInput').value = apiUrl;

    function toggleApiPanel() {
      const panel = document.getElementById('apiPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }
    // Close panel when clicking outside
    document.addEventListener('click', function (e) {
      const panel = document.getElementById('apiPanel');
      const btn = document.getElementById('apiConnectBtn');
      if (panel && panel.style.display !== 'none' && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.style.display = 'none';
      }
    });

    function saveApiUrl() {
      const val = document.getElementById('apiUrlInput').value.trim();
      if (!val) return showToast('❌ URL দাও');
      document.getElementById('apiPanel').style.display = 'none';
      apiUrl = val;
      localStorage.setItem('stockview_api_url', val);
      loadData(true);
    }

    // ─── Data loading ─────────────────────────────────────────────────────────────
    // JSONP fetch — bypasses CORS for Google Apps Script
    // Apps Script does a 302 redirect; JSONP handles it via <script> tag
    function fetchJSONP(baseUrl, options = {}) {
      return new Promise((resolve, reject) => {
        const cbName = '__sv_' + Date.now();
        const script = document.createElement('script');
        const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout after 20s')); }, 20000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          script.parentNode && script.parentNode.removeChild(script);
        }

        window[cbName] = function (data) { cleanup(); resolve(data); };
        script.onerror = function () { cleanup(); reject(new Error('Could not load Apps Script URL — check deployment settings')); };

        // Strip any existing callback param, then add ours
        const clean = baseUrl.replace(/[?&]callback=[^&]*/g, '').replace(/[?&]_t=[^&]*/g, '');
        const sep = clean.includes('?') ? '&' : '?';
        // noCache flag forces Apps Script to bypass its cache
        const nc = options.noCache ? '&nocache=1' : '';
        script.src = clean + sep + 'callback=' + cbName + nc + '&_t=' + Date.now();
        document.head.appendChild(script);
      });
    }

    async function loadData(force = false) {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');
      setApiStatus('loading', 'Connecting…');

      if (apiUrl) {
        try {
          const data = await fetchJSONP(apiUrl, { noCache: force });
          if (data.error) throw new Error(data.error);

          PRODUCTS = data.products || [];
          INVENTORY = data.inventory || {};

          if (data.lastUpdated) {
            const d = new Date(data.lastUpdated);
            document.getElementById('lastUpdatedTime').textContent = d.toLocaleString();
            document.getElementById('lastUpdatedBar').style.display = 'flex';
          }

          setApiStatus('connected', 'Live — Google Sheets');
          const btn = document.getElementById('apiConnectBtn');
          if (btn) { btn.textContent = '✅ Live'; btn.style.borderColor = 'var(--green)'; btn.style.color = 'var(--green)'; }
          document.getElementById('statDot').classList.remove('offline');
          showToast('✅ Live data loaded — ' + PRODUCTS.length + ' products');
          startAutoRefresh();
        } catch (e) {
          console.error('API error:', e);
          setApiStatus('disconnected', 'Connection failed');
          document.getElementById('statDot').classList.add('offline');
          showToast('⚠️ API error — showing cached data');
          useFallback();
        }
      } else {
        useFallback();
        setApiStatus('disconnected', 'No API — Offline data');
      }

      btn.classList.remove('spinning');
      buildFilterChips();
      renderGrid();
    }

    function useFallback() {
      PRODUCTS = FALLBACK_PRODUCTS;
      INVENTORY = FALLBACK_INVENTORY;
      PRODUCTS.forEach(p => { if (INVENTORY[p.sku] !== undefined) p.inventoryStock = INVENTORY[p.sku]; });
    }

    function setApiStatus(state, text) {
      const dot = document.getElementById('apiDot');
      dot.className = 'api-dot ' + (state === 'connected' ? 'connected' : state === 'loading' ? 'loading' : 'disconnected');
      document.getElementById('apiStatusText').textContent = text;
    }

    // Auto-refresh every 5 minutes when connected
    function startAutoRefresh() {
      clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(() => loadData(false), 10 * 1000); // check every 10s
    }

    // ─── Filters ──────────────────────────────────────────────────────────────────
    function buildFilterChips() {
      const chips = document.getElementById('filterChips');
      chips.innerHTML = '<div class="chip active" data-filter="all" onclick="setFilter(\'all\',this)">All</div>';
      const models = [...new Set(PRODUCTS.map(p => p.model).filter(m => m && m !== 'nan' && m !== ''))].sort();
      models.forEach(m => {
        const d = document.createElement('div');
        d.className = 'chip'; d.dataset.filter = m;
        d.textContent = 'Model ' + m;
        d.onclick = function () { setFilter(m, this); };
        chips.appendChild(d);
      });
      ['In Stock', 'Out of Stock'].forEach(s => {
        const d = document.createElement('div');
        d.className = 'chip'; d.dataset.filter = s;
        d.textContent = s;
        d.onclick = function () { setFilter(s, this); };
        chips.appendChild(d);
      });
      if (activeFilter !== 'all') {
        const active = chips.querySelector(`[data-filter="${activeFilter}"]`);
        if (active) { chips.querySelector('.active').classList.remove('active'); active.classList.add('active'); }
      }
    }

    function setFilter(v, el) {
      activeFilter = v;
      document.querySelectorAll('.filter-chips .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderGrid();
    }

    // ─── Search ───────────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', function () {
      searchQuery = this.value.trim().toLowerCase();
      document.getElementById('searchClear').classList.toggle('vis', !!searchQuery);
      renderGrid();
    });
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      searchQuery = '';
      document.getElementById('searchClear').classList.remove('vis');
      renderGrid();
    }

    function filtered() {
      return PRODUCTS.filter(p => {
        // Skip legend/note rows
        if (!p.sku || p.sku.toUpperCase().includes('LEGEND') || p.sku.length > 60) return false;
        if (activeFilter === 'In Stock' && p.stockInHand <= 0) return false;
        if (activeFilter === 'Out of Stock' && p.stockInHand > 0) return false;
        if (activeFilter !== 'all' && activeFilter !== 'In Stock' && activeFilter !== 'Out of Stock' && p.model !== activeFilter) return false;
        if (searchQuery) {
          const hay = [p.sku, p.productName, p.color, p.model, p.manufacturer, p.notes, p.owdId].join(' ').toLowerCase();
          if (!hay.includes(searchQuery)) return false;
        }
        return true;
      });
    }

    // ─── Render ───────────────────────────────────────────────────────────────────
    function renderGrid() {
      const prods = filtered();
      document.getElementById('visibleCount').textContent = prods.length;
      document.getElementById('totalCount').textContent = PRODUCTS.length;
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      if (!prods.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No products found</div><p>Try a different search or filter</p></div>`;
        return;
      }

      prods.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.style.animationDelay = Math.min(i * .04, .5) + 's';
        const stock = p.stockInHand;
        const barPct = Math.min(100, (stock / 200) * 100);
        const delivKeys = Object.keys(p.deliveries || {}).slice(0, 4);
        const delivHTML = delivKeys.length
          ? delivKeys.map(k => `<div class="delivery-chip"><span class="delivery-month">${k}</span><span class="delivery-qty">${p.deliveries[k]}</span></div>`).join('')
          : '<span class="no-delivery">No upcoming deliveries</span>';
        const imgHTML = p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.sku}" onerror="this.parentNode.innerHTML='🪑'">` : '🪑';

        card.innerHTML = `
      <div class="card-header">
        <div class="card-image">${imgHTML}</div>
        <div class="card-info">
          <div class="card-sku">${p.sku}</div>
          <div class="card-name">${p.productName || 'Product ' + p.sku}</div>
          <div class="card-meta">
            ${p.color ? `<div class="color-badge">${colorDot(p.color)}<span>${p.color}</span></div>` : ''}
            ${p.model && p.model !== 'nan' ? `<div class="model-badge">Model ${p.model}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="stock-row">
          <div>
            <div class="stock-label">Stock In Hand</div>
            <div class="stock-bar-wrap"><div class="stock-bar" style="width:${barPct}%;background:${stockColor(stock)}"></div></div>
          </div>
          <div class="stock-value ${stockCls(stock)}">${stock}</div>
        </div>
        <div class="deliveries-preview">${delivHTML}</div>
      </div>`;
        card.onclick = () => openModal(p);
        grid.appendChild(card);
      });
    }

    // ─── Modal ────────────────────────────────────────────────────────────────────
    function openModal(p) {
      document.getElementById('mSku').textContent = p.sku;
      document.getElementById('mName').textContent = p.productName || 'Product ' + p.sku;
      const tagsEl = document.getElementById('mTags'); tagsEl.innerHTML = '';
      if (p.model && p.model !== 'nan') tagsEl.innerHTML += `<span class="tag tag-model">Model ${p.model}</span>`;
      if (p.color) tagsEl.innerHTML += `<span class="tag tag-color">${colorDot(p.color)} ${p.color}</span>`;
      if (p.manufacturer) tagsEl.innerHTML += `<span class="tag tag-mfr">${p.manufacturer}</span>`;

      const stock = p.stockInHand, inv = p.inventoryStock ?? stock;
      const delivEntries = Object.entries(p.deliveries || {});

      let body = `<div class="info-grid">
    <div class="info-card"><div class="info-card-label">Stock In Hand</div><div class="info-card-value ${stockCls(stock)}">${stock}</div><div class="info-card-sub">Units available</div></div>
    <div class="info-card"><div class="info-card-label">Inventory On Hand</div><div class="info-card-value ${stockCls(inv)}">${inv}</div><div class="info-card-sub">From inventory sheet</div></div>
  </div>`;

      if (delivEntries.length) {
        body += `<div class="section-title">Scheduled Deliveries</div><div class="deliveries-grid">
      ${delivEntries.map(([m, q], idx) => `<div class="delivery-card" style="animation-delay:${idx * .05}s"><div class="delivery-card-month">${m}</div><div class="delivery-card-qty">${q}</div></div>`).join('')}
    </div>`;
      }

      const details = [
        ['OWD ID', p.owdId || '—'],
        ['Sheet', p.sheetName || '—'],
        ['Source File', p.sourceFile || '—'],
        ['Product URL', p.productUrl ? `<a href="${p.productUrl}" target="_blank">View Product ↗</a>` : '—'],
        ['Upcoming', p.upcoming || '—'],
      ];
      body += `<div class="section-title">Details</div><div class="details-list">
    ${details.map(([k, v]) => `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`).join('')}
  </div>`;

      if (p.notes) body += `<div class="section-title">Notes</div><div class="notes-box">💡 ${p.notes}</div>`;

      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
    function closeModalOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ─── Toast ────────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ─── Init ─────────────────────────────────────────────────────────────────────
    loadData();
  </script>
